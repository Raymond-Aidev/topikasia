[build]
builder = "nixpacks"
buildCommand = "npx prisma generate --config prisma.config.ts && npm run build"

[deploy]
startCommand = "npx prisma migrate deploy --config prisma.config.ts && node dist/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
