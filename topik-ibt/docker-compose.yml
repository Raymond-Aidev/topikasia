version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: topikibt
      POSTGRES_USER: topik
      POSTGRES_PASSWORD: ${DB_PASSWORD:-topik_dev_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topik -d topikibt"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://topik:${DB_PASSWORD:-topik_dev_2026}@db:5432/topikibt
      JWT_SECRET: ${JWT_SECRET:-topik-ibt-jwt-secret-change-in-production-2026}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-topik-ibt-admin-jwt-secret-change-2026}
      FRONTEND_URL: https://www.topikasia.com
    ports:
      - "3000:3000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: https://www.topikasia.com
    depends_on:
      - server
    ports:
      - "8080:80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - client
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
