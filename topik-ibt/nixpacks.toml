[phases.setup]
nixPkgs = ["nodejs-20_x", "openssl"]

[phases.install]
cmds = ["cd server && npm ci", "cd client && npm ci"]

[phases.build]
cmds = [
  "cd client && npm run build",
  "cd server && npx prisma generate && npm run build",
  "mkdir -p server/dist/public && cp -r client/dist/* server/dist/public/"
]

[start]
cmd = "cd server && sh start.sh"
